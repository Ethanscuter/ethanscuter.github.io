name: Deploy site

# Manual deploy. Pick which content variant goes live at run time:
#   full    -> default variant
#   hamburg -> alternate variant
on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Which version to deploy"
        type: choice
        options:
          - full
          - hamburg
        default: full

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; do not cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        # Ruby 3.0 ships Psych 3, which the pinned Jekyll 3.9.0 (github-pages 215)
        # is happiest with. Bump this if you later upgrade the github-pages gem.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (full)
        if: ${{ inputs.variant == 'full' }}
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Build (Hamburg)
        if: ${{ inputs.variant == 'hamburg' }}
        run: bundle exec jekyll build --config _config.yml,_config.hamburg.yml --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
